<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Event Registration Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 text-gray-800">

   <!-- NAVBAR -->
<nav class="bg-white shadow sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
    <!-- Logo / Title -->
    <h1 class="text-xl font-bold text-blue-600">🎓 EduEvents</h1>
    <!-- Search Input -->
    <input
      type="text"
      id="search-input"
      placeholder="Search events..."
      class="border border-gray-300 rounded-full px-4 py-1 text-sm w-48 md:w-64 focus:outline-none focus:ring-2 focus:ring-blue-400"
    />
  </div>
</nav>

<!-- HERO SECTION -->
<section class="bg-gradient-to-r from-blue-600 to-indigo-700 text-white text-center py-16 px-4">
  <div class="max-w-2xl mx-auto">
    <h2 class="text-4xl font-bold mb-4">Student Event Registration</h2>
    <p class="text-lg">Browse, register, and manage school events all in one place. Stay organized and never miss an event.</p>
  </div>
</section>

   <!-- STATISTICS SECTION -->
<section class="bg-white shadow py-10 px-4">
  <div class="max-w-7xl mx-auto">
    <h3 class="text-2xl font-bold text-center text-gray-700 mb-8">Dashboard Overview</h3>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-center">

      <!-- Total Events -->
      <div class="bg-blue-50 rounded-xl shadow p-6">
        <p class="text-4xl font-bold text-blue-600" id="stat-total-events">0</p>
        <p class="text-gray-500 mt-2 text-sm font-medium">Total Events</p>
      </div>

      <!-- Total Registered Students -->
      <div class="bg-green-50 rounded-xl shadow p-6">
        <p class="text-4xl font-bold text-green-600" id="stat-total-registered">0</p>
        <p class="text-gray-500 mt-2 text-sm font-medium">Total Registered Students</p>
      </div>

      <!-- Remaining Available Seats -->
      <div class="bg-yellow-50 rounded-xl shadow p-6">
        <p class="text-4xl font-bold text-yellow-500" id="stat-total-seats">0</p>
        <p class="text-gray-500 mt-2 text-sm font-medium">Remaining Available Seats</p>
      </div>

    </div>
  </div>
</section>

   <!-- SEARCH AREA -->
<section class="max-w-7xl mx-auto px-4 pt-10">
  <h3 class="text-2xl font-bold text-gray-700 mb-4">Available Events</h3>
</section>

<!-- EVENT DISPLAY AREA -->
<section class="max-w-7xl mx-auto px-4 py-6">
  <div
    id="events-container"
    class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
  >
    <!-- Event cards will be injected here by JavaScript -->
  </div>
</section>

<!-- ADD EVENT FORM -->
<section class="bg-white shadow mt-6 py-10 px-4">
  <div class="max-w-2xl mx-auto">
    <h3 class="text-2xl font-bold text-gray-700 mb-6 text-center">Add New Event</h3>

    <!-- Validation Error Message -->
    <p id="form-error" class="text-red-500 text-sm text-center mb-4 hidden"></p>

    <div class="flex flex-col gap-4">

      <!-- Event Title -->
      <input
        type="text"
        id="event-title"
        placeholder="Event Title"
        class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      <!-- Category -->
      <select
        id="event-category"
        class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
      >
        <option value="">-- Select Category --</option>
        <option value="Technology">Technology</option>
        <option value="Science">Science</option>
        <option value="Arts">Arts</option>
        <option value="Sports">Sports</option>
        <option value="Business">Business</option>
      </select>

      <!-- Number of Seats -->
      <input
        type="number"
        id="event-seats"
        placeholder="Number of Seats"
        min="1"
        class="border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400"
      />

      <!-- Submit Button -->
      <button
        id="add-event-btn"
        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200"
      >
        Add Event
      </button>

    </div>
  </div>
</section>

    <!-- JavaScript -->
    <script src="app.js"></script>
  </body>
</html>
